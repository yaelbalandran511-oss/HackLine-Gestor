<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLine - Participantes</title>
    <!-- Bootstrap, Font Awesome, Google Fonts y estilos personalizados -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- BARRA DE NAVEGACIÓN (igual en todas las páginas) -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">HackLine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="participantes.html">Participantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mentores.html">Mentores</a></li>
                    <li class="nav-item"><a class="nav-link" href="evaluaciones.html">Evaluaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="cronograma.html">Cronograma</a></li>
                    <li class="nav-item"><a class="nav-link" href="historial.html">Historial</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Encabezado de la página -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-users me-3"></i>Gestión de Participantes</h1>
            <p class="text-white-50">Registrar participantes del hackathon.</p>
        </div>

        <!-- ============================================ -->
        <!-- FORMULARIO PARA AGREGAR/EDITAR PARTICIPANTES  -->
        <!-- POST /api/participantes para crear            -->
        <!-- PUT /api/participantes/:id para editar        -->
        <!-- ============================================ -->
        <div class="card-custom">
            <div class="card-body p-4">
                <div class="row g-3 mb-4">
                    <div class="col-md-4"><label class="form-label fw-semibold">Nombre</label><input type="text" id="partNombre" class="form-control" placeholder="Ej: Juan Pérez"></div>
                    <div class="col-md-4"><label class="form-label fw-semibold">Email</label><input type="email" id="partEmail" class="form-control" placeholder="juan@ejemplo.com"></div>
                    <div class="col-md-4"><label class="form-label fw-semibold">Habilidades</label><input type="text" id="partHabilidades" class="form-control" placeholder="Python, JavaScript, C#"></div>
                </div>
                <div class="d-flex gap-2 mb-3">
                    <!-- Botón Guardar: Agrega o actualiza según el modo -->
                    <button class="btn btn-primary" id="partGuardarBtn" type="button" onclick="guardarParticipante()"><i class="fas fa-user-plus me-2"></i>Agregar Participante</button>
                    <!-- Botón Cancelar: aparece solo en modo edición -->
                    <button class="btn btn-secondary" id="partCancelarBtn" type="button" onclick="cancelarEdicionParticipante()" style="display: none;"><i class="fas fa-times me-2"></i>Cancelar</button>
                </div>

                <!-- ============================================ -->
                <!-- TABLA DE PARTICIPANTES                       -->
                <!-- Muestra todos los participantes registrados  -->
                <!-- Botones: Editar (carga datos) y Eliminar     -->
                <!-- ============================================ -->
                <div class="table-responsive mt-4">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Habilidades</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="participantesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom"><p><strong>HackLine</strong></p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>

    <!-- ============================================ -->
    <!-- INICIALIZACIÓN DE LA PÁGINA                 -->
    <!-- renderizarParticipantes(): Carga la tabla   -->
    <!-- ============================================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderizarParticipantes === 'function') renderizarParticipantes();
        });
    </script>
</body>
</html>
