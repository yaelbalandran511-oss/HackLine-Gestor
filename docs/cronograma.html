<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLine - Cronograma</title>
    <!-- Bootstrap, Font Awesome, Google Fonts y estilos personalizados -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- BARRA DE NAVEGACIÓN (igual en todas las páginas) -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">HackLine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" href="participantes.html">Participantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mentores.html">Mentores</a></li>
                    <li class="nav-item"><a class="nav-link" href="evaluaciones.html">Evaluaciones</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cronograma.html">Cronograma</a></li>
                    <li class="nav-item"><a class="nav-link" href="historial.html">Historial</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Encabezado de la página -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-clock me-3"></i>Cronograma de Actividades</h1>
            <p class="text-white-50">Visualizar y gestionar el cronograma de cada evento.</p>
        </div>

        <!-- ============================================ -->
        <!-- FORMULARIO PARA AGREGAR/EDITAR ACTIVIDADES   -->
        <!-- POST /api/actividades para crear             -->
        <!-- PUT /api/actividades/:id para editar         -->
        <!-- ============================================ -->
        <div class="card-custom">
            <div class="card-body p-4">
                <div class="row g-3 mb-4">
                    <!-- Select de eventos (se llena con actualizarSelectEventosCronograma) -->
                    <div class="col-md-3"><label class="form-label fw-semibold">Evento</label><select id="actividadEventoId" class="form-select"></select></div>
                    <div class="col-md-3"><label class="form-label fw-semibold">Nombre</label><input type="text" id="actividadNombre" class="form-control" placeholder="Ej: Apertura"></div>
                    <div class="col-md-3"><label class="form-label fw-semibold">Descripción</label><input type="text" id="actividadDescripcion" class="form-control" placeholder="Breve descripción"></div>
                    <div class="col-md-3"><label class="form-label fw-semibold">Ubicación</label><input type="text" id="actividadUbicacion" class="form-control" placeholder="Auditorio / Online"></div>
                    <!-- Campo para fecha y hora en formato datetime-local -->
                    <div class="col-md-6"><label class="form-label fw-semibold">Fecha y Hora</label><input type="datetime-local" id="actividadFechaHora" class="form-control"></div>
                    <div class="col-md-6 d-flex align-items-end gap-2">
                        <!-- Botón Guardar: Agrega o actualiza según el modo -->
                        <button class="btn btn-primary flex-grow-1" id="btnGuardarActividad" onclick="agregarActividad()"><i class="fas fa-save me-2"></i>Agregar Actividad</button>
                        <!-- Botón Cancelar: aparece solo en modo edición -->
                        <button class="btn btn-secondary" id="btnCancelarActividad" onclick="cancelarEdicionActividad()" style="display:none;"><i class="fas fa-times me-2"></i>Cancelar</button>
                    </div>
                    <!-- Campo oculto para almacenar el ID de la actividad en edición -->
                    <input type="hidden" id="actividadEditId" value="">
                </div>

                <!-- ============================================ -->
                <!-- TABLA DE ACTIVIDADES (CRONOGRAMA)           -->
                <!-- Muestra todas las actividades ordenadas por fecha -->
                <!-- Eliminar: DELETE /api/actividades/:id        -->
                <!-- ============================================ -->
                <div class="table-responsive mt-4">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Evento</th>
                                <th>Actividad</th>
                                <th>Descripción</th>
                                <th>Fecha/Hora</th>
                                <th>Ubicación</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cronogramaBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom"><p>HackLine</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

    <!-- ============================================ -->
    <!-- INICIALIZACIÓN DE LA PÁGINA                 -->
    <!-- actualizarSelectEventosCronograma(): Llena el select de eventos -->
    <!-- renderizarCronograma(): Carga la tabla de actividades -->
    <!-- ============================================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof actualizarSelectEventosCronograma === 'function') actualizarSelectEventosCronograma();
            if (typeof renderizarCronograma === 'function') renderizarCronograma();
        });
    </script>
</body>
</html>
