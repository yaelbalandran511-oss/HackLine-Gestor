<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLine - Eventos</title>
    <!-- Bootstrap, Font Awesome, Google Fonts y estilos personalizados -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- BARRA DE NAVEGACIÓN (igual en todas las páginas) -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">HackLine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="eventos.html">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" href="participantes.html">Participantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mentores.html">Mentores</a></li>
                    <li class="nav-item"><a class="nav-link" href="evaluaciones.html">Evaluaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="cronograma.html">Cronograma</a></li>
                    <li class="nav-item"><a class="nav-link" href="historial.html">Historial</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Encabezado de la página -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-calendar-alt me-3"></i>Gestión de Eventos</h1>
            <p class="text-white-50">Crear, editar y eliminar eventos del hackathon.</p>
        </div>

        <!-- ============================================ -->
        <!-- FORMULARIO PARA AGREGAR/EDITAR EVENTOS       -->
        <!-- POST /api/eventos para crear                -->
        <!-- PUT /api/eventos/:id para editar            -->
        <!-- ============================================ -->
        <div class="card-custom">
            <div class="card-body p-4">
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" id="eventoNombre" class="form-control" placeholder="Ej: Hackathon 2026">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">Fecha Inicio</label>
                        <input type="date" id="eventoFechaInicio" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">Fecha Fin</label>
                        <input type="date" id="eventoFechaFin" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Lugar</label>
                        <input type="text" id="eventoLugar" class="form-control" placeholder="Online / Universidad">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">Cupo</label>
                        <input type="number" id="eventoCupo" class="form-control" value="50" min="1">
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea id="eventoDescripcion" class="form-control" rows="2" placeholder="Descripción del evento"></textarea>
                    </div>
                </div>
                <!-- Botón: Llama a guardarEvento() (agrega o actualiza según el modo) -->
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-primary" id="eventoGuardarBtn" type="button" onclick="guardarEvento()">
                        <i class="fas fa-plus-circle me-2"></i>Agregar Evento
                    </button>
                </div>

                <!-- ============================================ -->
                <!-- TABLA DE EVENTOS                             -->
                <!-- Muestra todos los eventos registrados       -->
                <!-- Botones: Editar (carga datos) y Eliminar    -->
                <!-- ============================================ -->
                <div class="table-responsive mt-4">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fecha Inicio</th>
                                <th>Lugar</th>
                                <th>Cupo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="eventosBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom"><p>HackLine</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

    <!-- ============================================ -->
    <!-- INICIALIZACIÓN DE LA PÁGINA                 -->
    <!-- renderizarEventos(): Carga la tabla de eventos -->
    <!-- ============================================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderizarEventos === 'function') renderizarEventos();
        });
    </script>
</body>
</html>
