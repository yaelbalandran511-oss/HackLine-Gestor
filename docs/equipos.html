<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLine - Equipos</title>
    <!-- Bootstrap, Font Awesome, Google Fonts y estilos personalizados -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- BARRA DE NAVEGACIÓN (igual en todas las páginas) -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">HackLine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" href="participantes.html">Participantes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mentores.html">Mentores</a></li>
                    <li class="nav-item"><a class="nav-link" href="evaluaciones.html">Evaluaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="cronograma.html">Cronograma</a></li>
                    <li class="nav-item"><a class="nav-link" href="historial.html">Historial</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Encabezado de la página -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-user-friends me-3"></i>Gestión de Equipos</h1>
            <p class="text-white-50">Formar equipos y asignar participantes.</p>
        </div>

        <!-- ============================================ -->
        <!-- FORMULARIO PARA AGREGAR/EDITAR EQUIPOS       -->
        <!-- POST /api/equipos para crear                 -->
        <!-- PUT /api/equipos/:id para editar             -->
        <!-- ============================================ -->
        <div class="card-custom">
            <div class="card-body p-4">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Nombre del equipo</label>
                        <input type="text" id="equipoNombre" class="form-control" placeholder="Ej: Code Warriors">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Evento asociado</label>
                        <!-- Select que se llena con cargarSelectEventos() desde app.js -->
                        <select id="equipoEventoId" class="form-select">
                            <option value="">Seleccionar evento...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Participantes (IDs separados por coma)</label>
                        <input type="text" id="equipoMiembros" class="form-control" placeholder="Ej: 1,2,3">
                    </div>
                </div>
                
                <!-- Botones de acción -->
                <div class="d-flex gap-2">
                    <!-- Botón Guardar: Agrega o actualiza según el modo -->
                    <button class="btn btn-primary" id="equipoGuardarBtn" type="button" onclick="guardarEquipo()">
                        <i class="fas fa-plus-circle me-2"></i>Agregar Equipo
                    </button>
                    <!-- Botón Cancelar: aparece solo en modo edición -->
                    <button class="btn btn-secondary" id="equipoCancelarBtn" type="button" style="display: none;" onclick="cancelarEdicionEquipo()">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </button>
                </div>

                <!-- ============================================ -->
                <!-- TABLA DE EQUIPOS                             -->
                <!-- Muestra todos los equipos registrados       -->
                <!-- Botones: Editar (carga datos) y Eliminar    -->
                <!-- ============================================ -->
                <div class="table-responsive mt-4">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Evento</th>
                                <th>Miembros</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="equiposBody">
                            <tr class="empty-row">
                                <td colspan="5">
                                    <i class="fas fa-spinner fa-spin me-2"></i>Cargando equipos...
                                 </td>
                             </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom">
        <p>HackLine</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
