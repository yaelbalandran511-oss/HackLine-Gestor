<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLine - Historial</title>
    <!-- Bootstrap, Font Awesome, Google Fonts y estilos personalizados -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">HackLine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" href="participantes.html">Participantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mentores.html">Mentores</a></li>
                    <li class="nav-item"><a class="nav-link" href="evaluaciones.html">Evaluaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="cronograma.html">Cronograma</a></li>
                    <li class="nav-item"><a class="nav-link active" href="historial.html">Historial</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                </ul>
                <span class="navbar-text ms-3 position-relative" id="notificacionesContainer"><i class="fas fa-bell"></i></span>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Encabezado de la página -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-history me-3"></i>Historial de Eventos Pasados</h1>
            <p class="text-white-50">Consulta eventos finalizados y sus resultados.</p>
        </div>

        <!-- TABLA DE HISTORIAL                            -->
        <!-- Muestra SOLO eventos cuya fecha_fin < hoy     -->
        <!-- Filtro aplicado en renderizarHistorial()      -->
        <!-- Botón "Ver resultados" muestra el ranking     -->
        <!-- del evento seleccionado                       -->
        <div class="card-custom">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fecha Inicio</th>
                                <th>Lugar</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="historialBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom"><p>HackLine</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

    <!-- INICIALIZACIÓN DE LA PÁGINA                 -->
    <!-- renderizarHistorial(): Carga SOLO eventos pasados -->
    <!-- (fecha_fin < fecha actual)                   -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderizarHistorial === 'function') renderizarHistorial();
            if (typeof actualizarBadgeNotificaciones === 'function') actualizarBadgeNotificaciones();
        });
    </script>
</body>
</html>
